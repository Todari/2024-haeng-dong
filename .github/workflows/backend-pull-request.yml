name: backend-pull-request

on:
  pull_request:
    branches: ["main", "be-dev"]
    paths:
      - "apps/server/**"
      - "packages/shared/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.15.1"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @haeng-dong/shared build

      - name: Generate Prisma client
        run: pnpm --filter @haeng-dong/server prisma:generate

      - name: Build server
        run: pnpm --filter @haeng-dong/server build

      - name: Run tests
        run: pnpm --filter @haeng-dong/server test
