name: backend-prod-deploy

on:
  push:
    branches: ["release"]
    paths:
      - "apps/server/**"
      - "packages/shared/**"
      - ".github/workflows/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        run: |
          docker buildx build --platform linux/arm64 \
            -f apps/server/Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE_BE_PROD }} \
            --push .

  deploy:
    needs: build
    strategy:
      matrix:
        runner: [prod-1, prod-2]
    runs-on: [self-hosted, "${{ matrix.runner }}"]
    steps:
      - name: Create Docker network if not exists
        run: |
          if ! sudo docker network ls --format '{{.Name}}' | grep -w "haengdong_network" > /dev/null 2>&1; then
            sudo docker network create haengdong_network
          fi

      - name: Ensure PostgreSQL is running
        run: |
          if ! sudo docker ps --format '{{.Names}}' | grep -w "haengdong-db" > /dev/null 2>&1; then
            echo "Starting PostgreSQL container..."
            sudo docker run -d \
              --name haengdong-db \
              --network haengdong_network \
              --restart always \
              -p 127.0.0.1:5432:5432 \
              -e POSTGRES_USER=${{ secrets.DB_USER }} \
              -e POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e POSTGRES_DB=haengdong \
              -v haengdong-pgdata:/var/lib/postgresql/data \
              -v haengdong-backups:/backups \
              postgres:16-alpine

            echo "Waiting for PostgreSQL to be ready..."
            sleep 10
          else
            echo "PostgreSQL is already running."
          fi

      - name: Pull new image
        run: sudo docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE_BE_PROD }}

      - name: Check running container and determine the next port
        run: |
          CURRENT_PORT=$(sudo docker ps --format "{{.Names}}" | grep "haengdong-backend-" | grep -o '8080\|8081' || echo "")
          if [ "$CURRENT_PORT" == "8081" ]; then
            NEXT_PORT=8080
          else
            NEXT_PORT=8081
          fi
          echo "NEXT_PORT=$NEXT_PORT" >> $GITHUB_ENV
          echo "CURRENT_PORT=$CURRENT_PORT" >> $GITHUB_ENV

      - name: Run new container on the alternate port
        run: |
          sudo docker run -d \
            --name haengdong-backend-$NEXT_PORT \
            --network haengdong_network \
            --restart unless-stopped \
            -p $NEXT_PORT:8080 \
            -e DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@haengdong-db:5432/haengdong?schema=public \
            -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
            -e CORS_ORIGIN=${{ secrets.CORS_ORIGIN }} \
            -e KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }} \
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE_BE_PROD }}

      - name: Health check the new container
        run: |
          MAX_ATTEMPTS=30
          SLEEP_INTERVAL=2
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$NEXT_PORT/api || echo "000")
            if [ "$STATUS" != "000" ]; then
              echo "Health check passed on attempt $ATTEMPT."
              break
            fi
            ATTEMPT=$((ATTEMPT+1))
            sleep $SLEEP_INTERVAL
            if [ $ATTEMPT -gt $MAX_ATTEMPTS ]; then
              echo "Health check failed. Rolling back..."
              sudo docker rm -f haengdong-backend-$NEXT_PORT
              exit 1
            fi
          done

      - name: Update Nginx to point to new container
        run: |
          NGINX_CONTAINER_NAME="nginx-proxy"
          mkdir -p ./nginx-conf
          cat > ./nginx-conf/default.conf << NGINXEOF
          server {
              listen 80 reuseport;
              location / {
                  proxy_pass http://haengdong-backend-$NEXT_PORT:8080;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  client_max_body_size 300M;
              }
          }
          NGINXEOF

          if sudo docker ps --filter "name=$NGINX_CONTAINER_NAME" --format "{{.Names}}" | grep -w $NGINX_CONTAINER_NAME; then
            sudo docker cp ./nginx-conf/default.conf $NGINX_CONTAINER_NAME:/etc/nginx/conf.d/default.conf
            sudo docker exec $NGINX_CONTAINER_NAME nginx -s reload
          else
            sudo docker run -d \
              --name $NGINX_CONTAINER_NAME \
              --network haengdong_network \
              --restart always \
              -p 80:80 \
              -v $(pwd)/nginx-conf:/etc/nginx/conf.d \
              nginx
          fi

      - name: Stop and remove the old container
        run: |
          if [ -n "$CURRENT_PORT" ]; then
            sudo docker ps --filter "publish=$CURRENT_PORT" --format "{{.ID}}" | xargs -r sudo docker stop
            sleep 15
            sudo docker ps -a --format "{{.Names}}" | grep "haengdong-backend-$CURRENT_PORT" | xargs -r sudo docker rm
          fi

      - name: Remove unused Docker images
        run: sudo docker image prune -af --filter "until=24h"
