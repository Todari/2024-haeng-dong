name: backend-dev-deploy

on:
  push:
    branches: ["be-dev"]
    paths:
      - "apps/server/**"
      - "packages/shared/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        run: |
          docker buildx build --platform linux/amd64 \
            --no-cache \
            -f apps/server/Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE_BE_DEV }} \
            --push .

  deploy:
    needs: build
    runs-on: [self-hosted, backend-dev]
    steps:
      - name: Create Docker network if not exists
        run: |
          if ! sudo docker network ls --format '{{.Name}}' | grep -w "haengdong_network" > /dev/null 2>&1; then
            sudo docker network create haengdong_network
          fi

      - name: Ensure PostgreSQL is running
        run: |
          if ! sudo docker ps --format '{{.Names}}' | grep -w "haengdong-db" > /dev/null 2>&1; then
            echo "Starting PostgreSQL container..."
            sudo docker run -d \
              --name haengdong-db \
              --network haengdong_network \
              --restart always \
              -p 127.0.0.1:5432:5432 \
              -e POSTGRES_USER=${{ secrets.DB_USER }} \
              -e POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e POSTGRES_DB=haengdong \
              -v haengdong-pgdata:/var/lib/postgresql/data \
              -v haengdong-backups:/backups \
              postgres:16-alpine

            echo "Waiting for PostgreSQL to be ready..."
            sleep 10
          else
            echo "PostgreSQL is already running."
          fi

      - name: Stop and remove old app container
        run: |
          if sudo docker ps -a --format '{{.Names}}' | grep -w "haengdong-backend" > /dev/null 2>&1; then
            sudo docker rm -f haengdong-backend
          fi

      - name: Pull new image
        run: sudo docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE_BE_DEV }}

      - name: Run new app container
        run: |
          sudo docker run -d \
            --name haengdong-backend \
            --network haengdong_network \
            --restart unless-stopped \
            -p 8080:8080 \
            -e DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@haengdong-db:5432/haengdong?schema=public \
            -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
            -e CORS_ORIGIN=${{ secrets.CORS_ORIGIN }} \
            -e KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }} \
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE_BE_DEV }}

      - name: Verify app started
        run: |
          sleep 10
          if sudo docker ps --format '{{.Names}}' | grep -w "haengdong-backend" > /dev/null 2>&1; then
            echo "App container is running."
            sudo docker logs --tail 20 haengdong-backend
          else
            echo "App container failed to start!"
            sudo docker logs haengdong-backend || true
            exit 1
          fi

      - name: Clean up old images
        run: sudo docker image prune -f
