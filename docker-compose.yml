services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: haengdong
      POSTGRES_PASSWORD: haengdong
      POSTGRES_DB: haengdong
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haengdong"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://haengdong:haengdong@db:5432/haengdong?schema=public
      JWT_SECRET: haengdong-dev-secret
      CORS_ORIGIN: http://localhost:3000
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
